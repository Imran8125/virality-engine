spring:
  application:
    name: virality-engine
  datasource:
    url: jdbc:postgresql://localhost:5433/virality_db
    username: virality
    password: virality_password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
