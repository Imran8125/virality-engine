services:
  postgres:
    image: postgres:15-alpine
    container_name: virality-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: virality
      POSTGRES_PASSWORD: virality_password
      POSTGRES_DB: virality_db
    volumes:
      - virality_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: virality-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  virality_pg_data:
